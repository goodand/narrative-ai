<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECOCO - Smart Image Storytelling</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        :root {
            --brand-color: #B2A5CF;
        }

        /* 로딩 스피너 */
        .loader {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top: 3px solid #000000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* 메타데이터 배지 스타일 */
        .metadata-pill {
            background: #ffffff;
            color: #BDC1C6;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 키워드 하이라이트 효과 */
        .keyword-highlight {
            background-color: var(--brand-color);
            color: #ffffff;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(178, 165, 207, 0.4);
            display: inline-block;
            margin: 2px 0;
        }

        .keyword-highlight:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(178, 165, 207, 0.6);
        }

        .btn-main {
            background-color: var(--brand-color);
            color: #ffffff;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-main:hover {
            transform: translateY(-2px);
            background-color: #9283b3;
            box-shadow: 0 12px 24px -8px rgba(178, 165, 207, 0.7);
        }

        /* SNS 플랫폼 선택 그리드 */
        .sns-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .sns-item {
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            border: 2px solid transparent;
            background: #F1F3F4;
            color: #BDC1C6;
            transition: all 0.2s;
        }

        .sns-item.active {
            background: var(--brand-color);
            border-color: var(--brand-color);
            color: #ffffff;
        }

        /* 모달 배경 처리 */
        #suggestion-modal,
        #settings-modal {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-12 px-4">
    <div class="max-w-2xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 relative">

        <!-- 설정 버튼: 시스템 프롬프트(Persona) 수정 -->
        <button id="open-settings"
            class="hidden absolute top-8 right-8 z-10 p-2 bg-white/10 hover:bg-white/20 rounded-full text-white transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>

        <!-- 상단 헤더 -->
        <div class="bg-white py-4 px-10 text-center relative border-b border-slate-100">
            <div class="flex items-center justify-center">
                <img src="assets/combination-type-logo_2026-01-21-18-22-51.svg" class="h-36" alt="RECOCO logo">
            </div>
        </div>

        <div class="p-8">
            <!-- [STAGE 1] IMAGE CARD -->
            <div id="drop-zone"
                class="border-2 border-dashed border-slate-200 rounded-[2rem] p-12 text-center hover:border-[#B2A5CF] transition-all cursor-pointer mb-6 bg-[#F1F3F4] group">
                <input type="file" id="image-input" accept="image/*" class="hidden">
                <div id="upload-placeholder">
                    <div
                        class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mx-auto mb-4 group-hover:bg-[#B2A5CF] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-[#BDC1C6] group-hover:text-white"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </div>
                    <p class="text-slate-900 font-extrabold">사진을 올리면, 기억을 더 잘 떠올릴 수 있어요</p>
                </div>
                <!-- 미리보기 및 메타데이터 컨테이너 -->
                <div id="preview-container" class="hidden">
                    <img id="image-preview" class="max-h-72 mx-auto rounded-2xl shadow-lg mb-6 border-4 border-white">
                    <div class="flex flex-wrap justify-center gap-2" id="meta-container">
                        <!-- 기존 메타데이터 숨김 (A/B 테스트) -->
                        <div class="metadata-pill hidden" id="meta-name"></div>
                        <div class="metadata-pill hidden" id="meta-size"></div>
                        <div class="metadata-pill hidden" id="meta-dim"></div>
                        <!-- 날짜 및 위치 데이터 필드 (우선 노출) -->
                        <div class="metadata-pill hidden bg-amber-50 border-amber-100 text-amber-700" id="meta-date">
                        </div>
                        <div class="metadata-pill hidden bg-indigo-50 border-indigo-100 text-indigo-600" id="meta-gps">
                        </div>
                    </div>
                </div>
            </div>

            <!-- [STAGE 1] NARRATIVE (결과물 우선 배치) -->
            <div id="result-area" class="mb-12 hidden relative">
                <div class="flex justify-between items-end mb-4 px-2">
                    <div>
                        <h3 class="text-2xl font-black text-slate-900 tracking-tighter">NARRATIVE</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Select highlighted
                            words for suggestions</p>
                    </div>
                    <div class="flex gap-2">
                        <button id="edit-btn"
                            class="text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl transition-colors font-black uppercase">Edit</button>
                        <button id="save-btn"
                            class="hidden text-[10px] bg-slate-900 text-white px-4 py-2 rounded-xl font-black uppercase">Save</button>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-[2rem] p-10 border border-slate-100 relative shadow-inner">
                    <div id="caption-interactive" class="text-slate-800 text-xl font-medium leading-relaxed"></div>
                    <textarea id="caption-edit"
                        class="hidden w-full bg-white border-2 border-slate-200 rounded-2xl p-6 text-slate-800 text-xl font-medium leading-relaxed focus:border-[#B2A5CF] outline-none min-h-[160px]"></textarea>

                    <div class="mt-10 flex items-center justify-between border-t border-slate-200 pt-6">
                        <button id="copy-btn"
                            class="bg-white text-slate-900 text-xs font-black px-6 py-4 rounded-xl shadow-sm hover:shadow-lg transition-all border border-slate-100">문구
                            복사하기</button>
                        <button id="share-btn"
                            class="bg-slate-900 text-white text-xs font-black px-6 py-4 rounded-xl shadow-sm hover:shadow-lg transition-all">공유하기</button>
                        <div class="flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-[#B2A5CF] animate-pulse"></span>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Gemini
                                Engine</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- [STAGE 2] OPTIONS (세부 설정 및 태그) -->
            <div class="space-y-8 mb-12">
                <!-- 추가 드롭다운 메뉴 (활동, 신체 상태, 관계) -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- 1. 무엇을 하고 있었나요? -->
                    <div>
                        <label for="activity-select" class="block text-[10px] font-black text-[#111111] uppercase tracking-widest mb-3 ml-1">Activity</label>
                        <select id="activity-select"
                            class="w-full bg-[#F1F3F4] border-none rounded-2xl p-6 text-slate-900 font-bold focus:ring-2 focus:ring-[#B2A5CF] outline-none cursor-pointer">
                            <option value="" disabled selected>무엇을 하고 있었나요?</option>
                            <option value="working">일하는 중</option>
                            <option value="resting">쉬는 중</option>
                            <option value="playing">놀고 있는 중</option>
                            <option value="exercising">운동 중</option>
                            <option value="eating">먹는 중</option>
                            <option value="moving">이동 중</option>
                            <option value="nothing">아무것도 안 하는 중</option>
                        </select>
                    </div>

                    <!-- 2. 이 때 몸은 어땠어요? -->
                    <div>
                        <label for="body-state-select" class="block text-[10px] font-black text-[#111111] uppercase tracking-widest mb-3 ml-1">Body State</label>
                        <select id="body-state-select"
                            class="w-full bg-[#F1F3F4] border-none rounded-2xl p-6 text-slate-900 font-bold focus:ring-2 focus:ring-[#B2A5CF] outline-none cursor-pointer">
                            <option value="" disabled selected>몸은 어땠어요?</option>
                            <option value="light">가벼웠어요</option>
                            <option value="tired">피곤했어요</option>
                            <option value="stiff">뻐근했어요</option>
                            <option value="weak">힘이 빠져 있었어요</option>
                            <option value="tense">몸에 힘이 들어가 있었어요</option>
                        </select>
                    </div>

                    <!-- 3. 관계의 상태 -->
                    <div>
                        <label for="relationship-select" class="block text-[10px] font-black text-[#111111] uppercase tracking-widest mb-3 ml-1">Relationship</label>
                        <select id="relationship-select"
                            class="w-full bg-[#F1F3F4] border-none rounded-2xl p-6 text-slate-900 font-bold focus:ring-2 focus:ring-[#B2A5CF] outline-none cursor-pointer">
                            <option value="" disabled selected>관계의 상태</option>
                            <option value="alone_full">혼자였지만 충만</option>
                            <option value="alone_lonely">혼자였고 외로움</option>
                            <option value="together_alone">함께 있었지만 혼자 같음</option>
                            <option value="together_stable">함께 있어서 안정됨</option>
                            <option value="connected">연결되어 있다고 느꼈음</option>
                            <option value="distanced">거리감을 느꼈음</option>
                            <option value="changing">관계가 변하고 있던 시점</option>
                        </select>
                    </div>
                </div>

                <!-- 감정의 온도 UI -->
                <div>
                    <span class="block text-[10px] font-black text-[#111111] uppercase tracking-widest mb-3 ml-1">감정의
                        온도 (Emotion Temperature)</span>
                    <div class="flex bg-[#F1F3F4] p-2 rounded-[1.5rem] gap-1" id="temp-toggle-group">
                        <button
                            class="flex-1 py-4 px-4 rounded-2xl text-xs font-bold transition-all flex items-center justify-center gap-2 hover:bg-white/50"
                            data-value="Cold">
                            <span class="text-lg">🔵</span> 차가움
                        </button>
                        <button
                            class="flex-1 py-4 px-4 rounded-2xl text-xs font-bold transition-all flex items-center justify-center gap-2 bg-white shadow-sm"
                            data-value="Lukewarm">
                            <span class="text-lg">🟡</span> 미지근함
                        </button>
                        <button
                            class="flex-1 py-4 px-4 rounded-2xl text-xs font-bold transition-all flex items-center justify-center gap-2 hover:bg-white/50"
                            data-value="Hot">
                            <span class="text-lg">🔴</span> 뜨거움
                        </button>
                    </div>
                </div>

                <!-- 태그 입력 -->
                <div>
                    <label for="tags-input" class="block text-[10px] font-black text-[#111111] uppercase tracking-widest mb-3 ml-1">Tags
                        (Optional)</label>
                    <input type="text" id="tags-input"
                        class="w-full bg-[#F1F3F4] border-none rounded-2xl p-5 text-slate-900 font-bold focus:ring-2 focus:ring-[#B2A5CF] outline-none placeholder-slate-400"
                        placeholder="#태그 #키워드 #입력">
                </div>
            </div>

            <!-- [STAGE 3] SYSTEM (플랫폼 및 스타일 설정) -->
            <div class="space-y-6 mb-10">
                <div>
                    <span class="block text-[10px] font-black text-[#111111] uppercase tracking-widest mb-3 ml-1">Target
                        Platform</span>
                    <div class="sns-grid" id="sns-toggle-group">
                        <div class="sns-item active" data-value="Instagram">Instagram</div>
                        <div class="sns-item" data-value="Threads">Threads</div>
                        <div class="sns-item" data-value="Twitter (X)">Twitter (X)</div>
                        <div class="sns-item" data-value="Facebook">Facebook</div>
                        <div class="sns-item" data-value="Naver Blog">Blog</div>
                        <div class="sns-item" data-value="TikTok">TikTok</div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-6">
                    <div class="flex-1">
                        <label for="language-select"
                            class="block text-[10px] font-black text-[#111111] uppercase tracking-widest mb-3 ml-1">Language</label>
                        <select id="language-select"
                            class="w-full bg-[#F1F3F4] border-none rounded-2xl p-7 text-slate-900 font-bold focus:ring-2 focus:ring-[#B2A5CF] outline-none cursor-pointer">
                            <option value="Korean">한국어</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label for="style-select"
                            class="block text-[10px] font-black text-[#111111] uppercase tracking-widest mb-3 ml-1">Mood
                            Style</label>
                        <select id="style-select"
                            class="w-full bg-[#F1F3F4] border-none rounded-2xl p-6 text-slate-900 font-bold focus:ring-2 focus:ring-[#B2A5CF] outline-none cursor-pointer">
                            <option value="emotional">감성적인 기록</option>
                            <option value="descriptive">상세한 묘사</option>
                            <option value="funny">유머러스한 코멘트</option>
                            <option value="minimalist">미니멀리스트</option>
                            <option value="gen-z">젠지 (Gen-Z)</option>
                            <option value="young-forty">영포티 (Young Forty)</option>
                            <option value="middle-aged">50대 아버님</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 생성 버튼 -->
            <button id="generate-btn"
                class="w-full btn-main py-6 px-6 rounded-[1.5rem] flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed text-lg shadow-xl shadow-indigo-100">
                <span id="btn-text">내 기억을 선명하게 하기</span>
                <div id="btn-loader" class="loader hidden"></div>
            </button>

            <div id="error-msg"
                class="mt-6 text-red-500 text-sm hidden text-center font-bold bg-red-50 p-5 rounded-2xl"></div>
        </div>
    </div>

    <!-- 유의어 추천 모달 -->
    <div id="suggestion-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden px-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform transition-all duration-200"
            id="modal-content">
            <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                <span class="text-xs font-black uppercase tracking-widest text-[#B2A5CF]">Word Suggestions</span>
                <button id="close-modal" class="text-white opacity-50 hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <div id="suggestion-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- 시스템 설정 모달 (프롬프트 입력) -->
    <div id="settings-modal" class="fixed inset-0 z-[110] flex items-center justify-center hidden px-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden transform transition-all duration-200"
            id="settings-content">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-[#B2A5CF] rounded-xl"><svg xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5 text-slate-900" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
                                clip-rule="evenodd" />
                        </svg></div>
                    <span class="text-xl font-black tracking-tight">System Settings</span>
                </div>
                <button id="close-settings" class="text-white opacity-50 hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label for="system-prompt-input" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">AI
                        System Prompt</label>
                    <textarea id="system-prompt-input"
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 text-slate-700 font-medium leading-relaxed focus:border-[#B2A5CF] outline-none min-h-[180px] text-sm shadow-inner"
                        placeholder="예: '너는 감성적인 사진작가야. 아주 서정적인 문체를 사용해줘.'"></textarea>
                </div>
                <button id="save-settings"
                    class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-slate-800 transition-all uppercase tracking-widest text-xs">프롬프트
                    설정 저장</button>
            </div>
        </div>
    </div>

    <!-- 수정 확인 모달 (추가) -->
    <div id="edit-confirm-modal"
        class="fixed inset-0 z-[120] flex items-center justify-center hidden px-4 bg-black/50 backdrop-blur-sm">
        <div
            class="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform transition-all p-8 text-center">
            <div class="mb-6">
                <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h3 class="text-lg font-black text-slate-900 mb-2">수정 모드로 전환하시겠습니까?</h3>
                <p class="text-slate-500 text-sm leading-relaxed">
                    수정 모드에서는 <span class="text-amber-600 font-bold">단어 하이라이트 및 추천 기능이 사라집니다.</span><br>
                    계속 진행하시겠습니까?
                </p>
            </div>
            <div class="flex gap-3">
                <button id="cancel-edit-btn"
