<!DOCTYPE html>
<html class="dark" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RECOCO - Smart Image Storytelling</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="text-white antialiased custom-scrollbar">
    <!-- Header -->
    <header id="main-header" class="sticky top-0 z-50 flex items-center bg-dark-bg/80 backdrop-blur-[20px] px-4 pb-3 justify-between" style="padding-top: calc(env(safe-area-inset-top) + 12px);">
        <button id="back-btn" class="flex size-10 shrink-0 items-center justify-start cursor-pointer">
            <span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
        </button>
        <h2 id="header-title" class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">데일리 큐레이션</h2>
        <div class="flex size-10 items-center justify-end">
            <button id="open-settings" class="text-primary text-base font-bold leading-normal tracking-tight cursor-pointer">
                설정
            </button>
        </div>
    </header>

    <main class="pb-40">
        <!-- New Home Dashboard (Initially Visible) -->
        <div id="home-view" class="min-h-screen bg-dark-bg">
            <!-- Dynamic content from HomeManager will be injected here -->
        </div>

        <!-- Report View (New) -->
        <div id="report-view" class="hidden min-h-screen bg-dark-bg">
            <!-- Dynamic content from ReportManager will be injected here -->
        </div>

        <!-- MyPage View (New: Moved from JS dynamic creation to static HTML) -->
        <div id="mypage-view" class="hidden min-h-screen bg-dark-bg">
            <!-- Dynamic content from MyPageManager will be injected here -->
        </div>

        <!-- Notice View (New: Notification Settings) -->
        <div id="notice-view" class="hidden min-h-screen bg-dark-bg">
            <!-- Dynamic content from NoticeManager will be injected here -->
        </div>

        <!-- Input View (Unplanned for this version) -->
        <div id="input-view" class="hidden min-h-screen bg-dark-bg"></div>

        <!-- Result View (Unplanned for this version) -->
        <div id="result-view" class="hidden px-6 pt-4">
            <!-- Image Card -->
            <div class="bg-field-bg/30 rounded-[2.5rem] p-6 border border-white/5">
                <div class="relative aspect-square overflow-hidden rounded-[2rem] shadow-2xl">
                    <img id="result-image" class="w-full h-full object-cover" src="" alt="Selected Moment">
                </div>
                <div class="mt-6 text-center">
                    <p class="text-muted-lavender text-[10px] font-bold uppercase tracking-[0.2em] mb-4">Selected Moment</p>
                    <div class="flex justify-center gap-2">
                        <div class="flex items-center gap-1.5 px-3 py-1.5 bg-field-bg rounded-full border border-white/5">
                            <span class="text-xs">📅</span>
                            <span id="result-date" class="text-xs font-medium text-white/80"></span>
                        </div>
                        <div class="flex items-center gap-1.5 px-3 py-1.5 bg-field-bg rounded-full border border-white/5">
                            <span class="text-xs">📍</span>
                            <span id="result-location" class="text-xs font-medium text-white/80"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Narrative Section -->
            <div class="mt-10">
                <div class="flex items-center justify-between mb-2 px-2">
                    <div>
                        <h3 class="text-white font-bold text-lg tracking-wider">NARRATIVE</h3>
                        <p class="text-muted-lavender text-[11px]">강조된 단어를 눌러 다른 표현을 찾아보세요.</p>
                    </div>
                    <button id="edit-btn" class="bg-field-bg px-3 py-1 rounded-lg text-xs font-medium text-white/60 hover:text-white transition-colors">수정</button>
                    <button id="save-btn" class="hidden bg-primary px-3 py-1 rounded-3xl text-xs font-medium text-dark-bg transition-colors">저장</button>
                </div>
                
                <div class="relative bg-field-bg rounded-[24px] p-6 mt-4 border border-white/5">
                    <div id="caption-interactive" class="text-lg leading-[1.8] text-white/90"></div>
                    <textarea id="caption-edit" class="hidden w-full bg-dark-bg border border-white/5 rounded-2xl p-4 text-white text-lg font-medium leading-relaxed focus:border-primary outline-none min-h-[160px] transition-colors duration-200"></textarea>
                    
                    <div class="mt-8 flex items-center justify-between border-t border-white/5 pt-4">
                        <button id="copy-btn" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 hover:bg-white/10 transition-colors">
                            <span class="material-symbols-outlined text-sm">content_copy</span>
                            <span class="text-xs font-medium">문구 복사하기</span>
                        </button>
                        <div class="flex items-center gap-1.5 opacity-50">
                            <div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
                            <span class="text-[10px] font-bold tracking-tighter uppercase">Gemini Engine</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="mt-10 space-y-3 pb-8">
                <button id="regenerate-btn" class="w-full h-14 rounded-3xl border border-white/10 text-[#B2B0B5] font-bold text-base active:scale-[0.98] transition-all flex items-center justify-center gap-2 hover:bg-white/5">
                    <span class="material-symbols-outlined text-xl">refresh</span>
                    내 기억을 선명하게 하기
                </button>
                <button id="final-share-btn" class="w-full bg-primary text-dark-bg h-14 rounded-3xl font-bold text-lg shadow-[0_8px_24px_rgba(178,165,207,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    기록 공유하기
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom Action Bar -->
    <div id="bottom-action-bar" class="fixed bottom-0 left-0 right-0 z-50">
        <div id="generate-btn-container" class="hidden"></div>
        
        <nav class="bg-dark-bg/80 ios-tab-bar border-t border-white/5 px-10 pb-8 pt-3 flex justify-between items-center max-w-md mx-auto">
            <div id="nav-home" class="flex flex-col items-center gap-1 text-primary cursor-pointer">
                <span class="material-symbols-outlined text-[28px] fill-[1]">home</span>
                <span class="text-[10px] font-bold">홈</span>
            </div>
            <div id="nav-report" class="flex flex-col items-center gap-1 opacity-40 cursor-pointer">
                <span class="material-symbols-outlined text-[28px]">bar_chart</span>
                <span class="text-[10px] font-bold">리포트</span>
            </div>
            <div id="nav-mypage" class="flex flex-col items-center gap-1 opacity-40 cursor-pointer">
                <span class="material-symbols-outlined text-[28px]">person</span>
                <span class="text-[10px] font-bold">마이페이지</span>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <!-- Suggestion Modal -->
    <div id="suggestion-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden px-4">
        <div class="bg-dark-bg border border-white/10 rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden" id="modal-content">
            <div class="bg-field-bg p-6 text-white flex justify-between items-center border-b border-white/5">
                <span class="text-xs font-black uppercase tracking-widest text-primary">Word Suggestions</span>
                <button id="close-modal" class="text-white/50 hover:text-white">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6">
                <div id="suggestion-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-[110] flex items-center justify-center hidden px-4">
        <div class="bg-dark-bg border border-white/10 rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden" id="settings-content">
            <div class="bg-field-bg p-8 text-white flex justify-between items-center border-b border-white/5">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">settings</span>
                    <span class="text-xl font-black tracking-tight">System Settings</span>
                </div>
                <button id="close-settings" class="text-white/50 hover:text-white">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label for="system-prompt-input" class="block text-[10px] font-black text-muted-lavender uppercase tracking-widest mb-3 ml-1">AI System Prompt</label>
                    <textarea id="system-prompt-input" class="w-full bg-field-bg border border-white/5 rounded-2xl p-4 text-white/80 font-medium leading-relaxed focus:border-primary outline-none min-h-[180px] text-sm transition-colors duration-200" placeholder="예: '너는 감성적인 사진작가야...'"></textarea>
                </div>
                <button id="save-settings" class="w-full bg-primary text-dark-bg font-black h-14 rounded-3xl hover:bg-primary/90 transition-all uppercase tracking-widest text-xs">설정 저장</button>
            </div>
        </div>
    </div>

    <!-- Edit Confirm Modal -->
    <div id="edit-confirm-modal" class="fixed inset-0 z-[120] flex items-center justify-center hidden px-4">
        <div class="bg-dark-bg border border-white/10 rounded-[2rem] shadow-2xl w-full max-sm overflow-hidden p-8 text-center">
            <div class="mb-6">
                <span class="material-symbols-outlined text-4xl text-amber-500 mb-4">warning</span>
                <h3 class="text-lg font-bold text-white mb-2">수정 모드로 전환</h3>
                <p class="text-muted-lavender text-sm leading-relaxed">
                    수정 모드에서는 <span class="text-amber-500 font-bold">단어 추천 기능이 비활성화</span>됩니다.<br>계속하시겠습니까?
                </p>
            </div>
            <div class="flex gap-3">
                <button id="cancel-edit-btn" class="flex-1 h-14 rounded-3xl font-bold bg-transparent border border-white/10 text-[#B2B0B5] hover:bg-white/5 transition-colors">취소</button>
                <button id="confirm-edit-btn" class="flex-1 h-14 rounded-3xl font-bold bg-primary text-dark-bg hover:bg-primary/90 transition-colors">확인</button>
            </div>
        </div>
    </div>

    <!-- Onboarding Modal -->
    <div id="onboarding-modal" class="fixed inset-0 z-[200] flex items-center justify-center hidden">
        <div class="bg-dark-bg w-full h-[100dvh] max-w-md mx-auto overflow-hidden relative" id="onboarding-content">
            <!-- Dynamic content will be injected here -->
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-[210] flex items-center justify-center hidden">
        <div class="bg-dark-bg w-full h-full max-w-md mx-auto overflow-hidden relative" id="auth-content">
            <!-- Dynamic content will be injected here -->
        </div>
    </div>

    <!-- Permission Modal -->
    <div id="permission-modal" class="fixed inset-0 z-[220] flex items-center justify-center hidden">
        <div class="bg-dark-bg w-full h-full max-w-md mx-auto overflow-hidden relative" id="permission-content">
            <!-- Dynamic content will be injected here -->
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>

</html>
