name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build for iOS Simulator (Universal Release)
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build \
            -destination "generic/platform=iOS Simulator" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find and zip .app for Appetize.io
        run: |
          # 1. 빌드된 .app 경로 찾기
          APP_PATH=$(find ios/App/build -maxdepth 6 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app folder not found!"
            find ios/App/build -type d -maxdepth 6
            exit 1
          fi

          echo "Found .app at: $APP_PATH"
          
          # 아키텍처 확인 로그 추가
          echo "=== Binary Architecture Check ==="
          lipo -info "$APP_PATH/App"

          # 2. 실행 권한 부여
          chmod +x "$APP_PATH/App"
          
          # 3. 압축 (폴더 자체를 포함)
          PARENT_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          cd "$PARENT_DIR"
          zip -r "$GITHUB_WORKSPACE/NarrativeAI.zip" "$APP_NAME"

          # 4. 검증 로그 강화
          echo "=== Zip Structure Verification ==="
          unzip -l "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
