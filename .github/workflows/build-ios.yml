name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check environment
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcodebuild -showsdks | grep -i sim

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build for iOS Simulator (Universal Release)
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build \
            -destination "generic/platform=iOS Simulator" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify binary architectures
        run: |
          APP_PATH=$(find "$GITHUB_WORKSPACE/ios/App/build/Build/Products/Release-iphonesimulator" -name "*.app" -type d | head -1)
          echo "App: $APP_PATH"
          BINARY="$APP_PATH/App"
          echo "Binary: $BINARY"
          file "$BINARY"
          lipo -info "$BINARY"

      - name: Zip .app for Appetize.io
        run: |
          APP_PATH=$(find ios/App/build/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found!"
            exit 1
          fi

          PARENT_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          cd "$PARENT_DIR"
          zip -ry "$GITHUB_WORKSPACE/NarrativeAI.zip" "$APP_NAME"

          echo "=== Zip top-level ==="
          zipinfo -1 "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -10
          echo "=== Size ==="
          ls -lh "$GITHUB_WORKSPACE/NarrativeAI.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
