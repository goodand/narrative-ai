name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build for iOS Simulator (Universal Release)
        run: |
          xcodebuild \
            -scheme App \
            -workspace ios/App/App.xcworkspace \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ios/App/build \
            -destination "generic/platform=iOS Simulator" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find and zip .app for Appetize.io
        run: |
          APP_PATH="$(find ios/App/build/Build/Products -type d -name 'App.app' -print -quit)"

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app folder not found!"
            find ios/App/build/Build/Products -maxdepth 6 -type d
            exit 1
          fi

          echo "Found .app at: $APP_PATH"
          chmod +x "$APP_PATH/App"
          echo "=== Binary Architecture Check ==="
          lipo -info "$APP_PATH/App"

          PARENT_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          cd "$PARENT_DIR"
          zip -r "$GITHUB_WORKSPACE/NarrativeAI.zip" "$APP_NAME"

          echo "=== Zip Structure Verification ==="
          unzip -l "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
