name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build for iOS Simulator (Universal Release)
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build \
            -destination "generic/platform=iOS Simulator" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find and zip .app for Appetize.io
        run: |
          APP_PATH=$(find ios/App/build -maxdepth 6 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found!"
            find ios/App/build -type d -maxdepth 6
            exit 1
          fi

          echo "Found .app at: $APP_PATH"
          ls -la "$APP_PATH"

          # ditto: Apple 공식 도구, --keepParent가 .app 폴더를 루트로 유지
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$GITHUB_WORKSPACE/NarrativeAI.zip"

          # 검증
          echo "=== Zip 내부 구조 ==="
          zipinfo "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -15

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
