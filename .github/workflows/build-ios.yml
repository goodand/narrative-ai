name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check environment
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcodebuild -showsdks | grep -i sim

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build for iOS Simulator (Universal Release)
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build \
            -destination "generic/platform=iOS Simulator" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify binary architectures
        run: |
          APP_PATH=$(find "$GITHUB_WORKSPACE/ios/App/build/Build/Products/Release-iphonesimulator" -name "*.app" -type d | head -1)
          echo "App: $APP_PATH"
          BINARY="$APP_PATH/App"
          echo "Binary: $BINARY"
          file "$BINARY"
          lipo -info "$BINARY"

      - name: Find and zip .app for Appetize.io
        run: |
          # 1. 빌드된 .app 폴더의 위치를 찾습니다.
          APP_PATH=$(find ios/App/build -name "App.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: App.app not found!"
            exit 1
          fi

          # 2. .app 폴더가 있는 위치의 '부모 디렉토리'로 이동합니다.
          PARENT_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")

          echo "Moving to $PARENT_DIR and zipping $APP_NAME"
          cd "$PARENT_DIR"

          # 3. 여기서 압축을 수행합니다. (중요: 상대 경로인 $APP_NAME 사용)
          zip -r "$GITHUB_WORKSPACE/NarrativeAI.zip" "$APP_NAME"

          # 4. 압축 파일 구조가 제대로 되었는지 로그에 남깁니다.
          echo "Final Zip structure check:"
          zipinfo "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
