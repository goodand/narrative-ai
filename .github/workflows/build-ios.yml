name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check Xcode & SDK info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcodebuild -showsdks | grep -i sim

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build for iOS Simulator
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath ./build \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip .app for Appetize.io
        run: |
          # .app 찾기
          APP_PATH=$(find ios/App/build/Build/Products -name "*.app" -type d | head -1)
          echo "Found: $APP_PATH"
          ls -la "$APP_PATH"

          # symlink 보존하며 루트에 .app 바로 위치하도록 압축
          pushd "$(dirname "$APP_PATH")"
          zip -ry "$GITHUB_WORKSPACE/NarrativeAI.zip" "$(basename "$APP_PATH")"
          popd

          # 검증
          echo "=== Zip top-level ==="
          zipinfo -1 "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -15
          echo "=== Zip size ==="
          ls -lh "$GITHUB_WORKSPACE/NarrativeAI.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
