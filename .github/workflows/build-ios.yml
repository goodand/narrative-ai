name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build for iOS Simulator (Universal Release)
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build \
            -destination "generic/platform=iOS Simulator" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find and zip .app for Appetize.io
        run: |
          APP_PATH=$(find ios/App/build -name "App.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: App.app not found!"
            find ios/App/build -type d -maxdepth 5
            exit 1
          fi

          echo "Found App.app at: $APP_PATH"

          # 핵심: .app 폴더의 상위로 이동 후, App.app 폴더째 압축
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/NarrativeAI.zip" App.app

          echo "Zip structure check (App.app이 루트에 있어야 함):"
          zipinfo "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
