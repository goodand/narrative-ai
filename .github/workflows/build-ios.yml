name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Build for iOS Simulator (Universal Release)
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build \
            -destination "generic/platform=iOS Simulator" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find and zip .app for Appetize.io
        run: |
          # Release 빌드 경로에서 App.app 탐색 (-maxdepth로 내부 중첩 방지)
          APP_PATH=$(find ios/App/build/Build/Products -maxdepth 2 -name "*.app" -type d | head -1)

          # 못 찾으면 전체 탐색 fallback
          if [ -z "$APP_PATH" ]; then
            echo "Products 경로에서 못 찾음, 전체 탐색..."
            APP_PATH=$(find ios/App/build -maxdepth 6 -name "*.app" -type d | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found!"
            echo "=== 빌드 디렉토리 구조 ==="
            find ios/App/build -type d -maxdepth 6
            exit 1
          fi

          echo "Found .app at: $APP_PATH"
          echo "=== .app 내부 확인 ==="
          ls -la "$APP_PATH"

          # 핵심: .app의 상위 디렉토리로 이동 → 폴더째 압축
          PARENT_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")

          cd "$PARENT_DIR"
          pwd
          echo "Zipping: $APP_NAME"
          zip -r -y "$GITHUB_WORKSPACE/NarrativeAI.zip" "$APP_NAME"

          # 검증: zip 루트에 .app 폴더가 있는지 확인
          echo "=== Zip 내부 구조 (루트에 App.app/ 이 보여야 성공) ==="
          zipinfo "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -15

          # 추가 검증: 첫 번째 엔트리가 .app/ 인지 확인
          FIRST_ENTRY=$(zipinfo -1 "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -1)
          if [[ "$FIRST_ENTRY" != *.app/* && "$FIRST_ENTRY" != *.app ]]; then
            echo "ERROR: zip 루트에 .app 폴더가 없음! 첫 엔트리: $FIRST_ENTRY"
            exit 1
          fi
          echo "OK: zip 구조 정상"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
