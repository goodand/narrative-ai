name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Copy web assets to iOS
        run: npx cap copy ios

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -scheme App -project App.xcodeproj

      - name: Build for iOS Simulator
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath ./build \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find and zip .app for Appetize.io
        run: |
          APP_PATH=$(find ios/App/build -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/NarrativeAI.zip" "$(basename "$APP_PATH")"
          echo "Zip contents:"
          zipinfo "$GITHUB_WORKSPACE/NarrativeAI.zip" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
