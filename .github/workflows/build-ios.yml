name: Build iOS Simulator App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Copy web assets to iOS
        run: npx cap copy ios

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -scheme App -project App.xcodeproj

      - name: Build for iOS Simulator
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -project App.xcodeproj \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath ./build \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip .app for Appetize.io
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r "$GITHUB_WORKSPACE/NarrativeAI.zip" App.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarrativeAI-simulator
          path: NarrativeAI.zip
