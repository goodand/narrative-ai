name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build

  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./backend

      - name: Start backend
        run: |
          cd backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 >/tmp/backend-health.log 2>&1 &
          echo $! >/tmp/backend-health.pid

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/tmp/health.json; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time" >&2
          exit 1

      - name: Assert healthy payload
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/health.json').read_text())
          assert payload['status'] == 'healthy', payload
          print(payload)
          PY

      - name: Dump backend log on failure
        if: failure()
        run: cat /tmp/backend-health.log

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend-health.pid ]; then
            kill "$(cat /tmp/backend-health.pid)" || true
          fi
