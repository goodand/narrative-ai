    <title>vakita - Smart Image Storytelling</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #111827; }
        :root { --brand-color: #E7FF68; }
        /* 로딩 스피너 */
        .loader {
            border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid #111827;
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 메타데이터 배지 스타일 */
        .metadata-pill {
            background: #ffffff; color: #4b5563; padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; border: 1px solid #e5e7eb;
            display: flex; align-items: center; gap: 4px;
        }
        /* 키워드 하이라이트 효과 */
        .keyword-highlight {
            background-color: var(--brand-color); color: #111827; cursor: pointer;
            padding: 2px 6px; border-radius: 6px; font-weight: 700; transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(231, 255, 104, 0.4); display: inline-block; margin: 2px 0;
        }
        .keyword-highlight:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(231, 255, 104, 0.6); }
        .btn-main {
            background-color: var(--brand-color); color: #111827; font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(231, 255, 104, 0.7); }
        /* SNS 플랫폼 선택 그리드 */
        .sns-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .sns-item {
            cursor: pointer; padding: 10px; border-radius: 12px; text-align: center;
            font-size: 0.75rem; font-weight: 700; border: 2px solid transparent;
            background: #f3f4f6; transition: all 0.2s;
        }
        .sns-item.active { background: var(--brand-color); border-color: #111827; color: #111827; }
        /* 모달 배경 처리 */
        #suggestion-modal, #settings-modal { background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); }
    </style>

            <p class="text-slate-400 text-sm font-medium tracking-tight uppercase tracking-widest">Metadata-Driven Storytelling</p>
        </div>

        <div class="p-8">
            <!-- 이미지 업로드 존 -->
            <div id="drop-zone" class="border-2 border-dashed border-slate-200 rounded-[2rem] p-10 text-center hover:border-[#E7FF68] transition-all cursor-pointer mb-8 bg-slate-50/50 group">
                <input type="file" id="image-input" accept="image/*" class="hidden">
                <div id="upload-placeholder">
                    <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mx-auto mb-4 group-hover:bg-[#E7FF68] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400 group-hover:text-slate-900" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </div>
                    <p class="text-slate-900 font-extrabold">사진을 업로드하여 서사를 시작하세요</p>
                </div>
                <!-- 미리보기 및 메타데이터 컨테이너 -->
                <div id="preview-container" class="hidden">
                    <img id="image-preview" class="max-h-72 mx-auto rounded-2xl shadow-lg mb-6 border-4 border-white">
                    <div class="flex flex-wrap justify-center gap-2" id="meta-container">
                        <div class="metadata-pill" id="meta-name"></div>
                        <div class="metadata-pill" id="meta-size"></div>
                        <div class="metadata-pill" id="meta-dim"></div>
                        <!-- 날짜 및 위치 데이터 필드 -->
                        <div class="metadata-pill hidden bg-amber-50 border-amber-100 text-amber-700" id="meta-date"></div>
                        <div class="metadata-pill hidden bg-indigo-50 border-indigo-100 text-indigo-600" id="meta-gps"></div>
                    </div>
                </div>
            </div>

            <!-- 타겟 플랫폼 및 스타일 옵션 -->
            <div class="space-y-6 mb-8">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">Target Platform</label>
                    <div class="sns-grid" id="sns-toggle-group">
                        <div class="sns-item active" data-value="Instagram">Instagram</div>
                        <div class="sns-item" data-value="Threads">Threads</div>
                        <div class="sns-item" data-value="Twitter (X)">Twitter (X)</div>
                        <div class="sns-item" data-value="Facebook">Facebook</div>
                        <div class="sns-item" data-value="Naver Blog">Blog</div>
                        <div class="sns-item" data-value="TikTok">TikTok</div>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Language</label>
                        <select id="language-select" class="w-full bg-slate-100 border-none rounded-2xl p-4 text-slate-900 font-bold focus:ring-2 focus:ring-[#E7FF68] outline-none cursor-pointer">
                            <option value="Korean">한국어</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Mood Style</label>
                        <select id="style-select" class="w-full bg-slate-100 border-none rounded-2xl p-4 text-slate-900 font-bold focus:ring-2 focus:ring-[#E7FF68] outline-none cursor-pointer">
                            <option value="emotional">감성적인 기록</option>
                            <option value="descriptive">상세한 묘사</option>
                            <option value="funny">유머러스한 코멘트</option>
                            <option value="minimalist">미니멀리스트</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 생성 버튼 -->
            <button id="generate-btn" class="w-full btn-main py-5 px-6 rounded-2xl flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed text-lg shadow-xl shadow-indigo-100">
                <span id="btn-text">내 기억을 선명하게 하기</span>
                <div id="btn-loader" class="loader hidden"></div>
            </button>

            <!-- 분석 결과 영역 -->
            <div id="result-area" class="mt-12 hidden relative">
                <div class="flex justify-between items-end mb-4 px-2">
                    <div>
                        <h3 class="text-2xl font-black text-slate-900 tracking-tighter italic">NARRATIVE</h3>

                    <div class="flex gap-2">
                        <button id="edit-btn" class="text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl transition-colors font-black uppercase">Edit</button>
                        <button id="save-btn" class="hidden text-[10px] bg-slate-900 text-white px-4 py-2 rounded-xl font-black uppercase">Save</button>
                    </div>
                </div>
                
                <div class="bg-slate-50 rounded-[2rem] p-10 border border-slate-100 relative shadow-inner">
                    <div id="caption-interactive" class="text-slate-800 text-xl font-medium leading-relaxed italic"></div>
                    <textarea id="caption-edit" class="hidden w-full bg-white border-2 border-slate-200 rounded-2xl p-6 text-slate-800 text-xl font-medium leading-relaxed focus:border-[#E7FF68] outline-none min-h-[160px]"></textarea>
                    
                    <div class="mt-10 flex items-center justify-between border-t border-slate-200 pt-6">
                        <button id="copy-btn" class="bg-white text-slate-900 text-xs font-black px-6 py-4 rounded-xl shadow-sm hover:shadow-lg transition-all border border-slate-100">문구 복사하기</button>
                        <div class="flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-[#E7FF68] animate-pulse"></span>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter italic">Gemini Engine</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="error-msg" class="mt-6 text-red-500 text-sm hidden text-center font-bold bg-red-50 p-5 rounded-2xl"></div>
        </div>
    </div>

    <!-- 유의어 추천 모달 -->
    <div id="suggestion-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden px-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform transition-all duration-200" id="modal-content">
            <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                <span class="text-xs font-black uppercase tracking-widest text-[#E7FF68]">Word Suggestions</span>
                <button id="close-modal" class="text-white opacity-50 hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="p-6"><div id="suggestion-list" class="space-y-3"></div></div>
        </div>
    </div>

    <!-- 시스템 설정 모달 (프롬프트 입력) -->
    <div id="settings-modal" class="fixed inset-0 z-[110] flex items-center justify-center hidden px-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden transform transition-all duration-200" id="settings-content">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-[#E7FF68] rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-900" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" /></svg></div>
                    <span class="text-xl font-black italic tracking-tight">System Settings</span>
                </div>
                <button id="close-settings" class="text-white opacity-50 hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">AI System Prompt</label>
                    <textarea id="system-prompt-input" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 text-slate-700 font-medium leading-relaxed focus:border-[#E7FF68] outline-none min-h-[180px] text-sm shadow-inner" placeholder="예: '너는 감성적인 사진작가야. 아주 서정적인 문체를 사용해줘.'"></textarea>
                </div>
                <button id="save-settings" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-slate-800 transition-all uppercase tracking-widest text-xs">프롬프트 설정 저장</button>
            </div>
        </div>
    </div>
